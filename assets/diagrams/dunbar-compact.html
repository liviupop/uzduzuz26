<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Why a dozen · uzinaduzina</title>
<link rel="stylesheet" href="../tokens.css" />
<style>
  html, body { margin: 0; background: var(--bg); }
  .compact {
    box-sizing: border-box;
    padding: var(--space-5);
    max-width: 540px;
    margin: 0;
    color: var(--ink);
  }
  svg { display: block; width: 100%; height: auto; }

  @keyframes ringExpand {
    from { r: 0; stroke-opacity: 0; }
    to { stroke-opacity: 1; }
  }
  @keyframes labelFade {
    from { opacity: 0; transform: translateY(3px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulseEgo {
    0%, 100% { r: 2; }
    50% { r: 3; opacity: 0.7; }
  }
  @keyframes drawMarker {
    from { stroke-dashoffset: 80; opacity: 0; }
    to { stroke-dashoffset: 0; opacity: 1; }
  }

  .ring {
    fill: var(--bg);
    stroke: var(--rule);
    stroke-width: 1;
    transition: stroke 200ms var(--ease-out);
    animation: ringExpand 700ms var(--ease-out) backwards;
  }
  .ring:nth-of-type(1) { animation-delay: 100ms; r: 170; }
  .ring:nth-of-type(2) { animation-delay: 200ms; r: 115; }
  .ring:nth-of-type(3) { animation-delay: 300ms; r: 75; }
  .ring:nth-of-type(4) { animation-delay: 400ms; r: 38; }

  .ring:hover { stroke: var(--accent); }
  .ring.dozen {
    fill: var(--accent-soft);
    stroke: var(--accent);
    stroke-width: 1.5;
  }

  .ring-number, .ring-tag {
    pointer-events: none;
    animation: labelFade 300ms var(--ease-out) backwards;
  }
  .ring-number {
    font-family: var(--font-display);
    font-weight: 700;
    fill: var(--accent);
    text-anchor: middle;
  }
  .ring-tag {
    font-family: var(--font-ui);
    font-size: 10px;
    letter-spacing: var(--tracking-meta);
    fill: var(--ink-muted);
    text-transform: uppercase;
    text-anchor: middle;
  }

  .ego {
    fill: var(--ink);
    animation: pulseEgo 3s ease-in-out 800ms infinite;
  }

  .marker {
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 700;
    fill: var(--accent);
    font-size: 12px;
    animation: labelFade 400ms var(--ease-out) 700ms backwards;
  }
  .marker-line {
    stroke: var(--accent);
    stroke-width: 1;
    stroke-dasharray: 80;
    animation: drawMarker 500ms var(--ease-out) 600ms backwards;
  }
  .read-more {
    font-family: var(--font-ui);
    font-size: var(--fs-meta);
    letter-spacing: var(--tracking-meta);
    color: var(--ink-muted);
    margin: var(--space-3) 0 0;
    text-align: center;
    opacity: 0;
    animation: labelFade 400ms var(--ease-out) 1000ms forwards;
  }
  .read-more a {
    color: var(--accent);
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .read-more a:hover {
    color: var(--accent-hover);
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition-duration: 0ms !important; }
  }
</style>
</head>
<body>
  <div class="compact">
    <svg viewBox="0 0 480 380" role="img" aria-label="Compact diagram of the four Dunbar layers, with the dozen layer highlighted">
      <!-- 150 -->
      <circle class="ring" cx="240" cy="190" r="170"></circle>
      <!-- 50 -->
      <circle class="ring" cx="240" cy="190" r="115"></circle>
      <!-- 15 dozen -->
      <circle class="ring dozen" cx="240" cy="190" r="75"></circle>
      <!-- 5 -->
      <circle class="ring" cx="240" cy="190" r="38"></circle>

      <!-- Labels -->
      <text class="ring-tag" x="240" y="36" style="animation-delay: 200ms">active network</text>
      <text class="ring-number" x="240" y="56" font-size="16" style="animation-delay: 250ms">150</text>

      <text class="ring-tag" x="240" y="92" style="animation-delay: 300ms">close network</text>
      <text class="ring-number" x="240" y="111" font-size="14" style="animation-delay: 350ms">50</text>

      <text class="ring-tag" x="240" y="135" style="animation-delay: 400ms">sympathy group</text>
      <text class="ring-number" x="240" y="154" font-size="13" style="animation-delay: 450ms">15</text>

      <text class="ring-tag" x="240" y="180" style="animation-delay: 500ms">support</text>
      <text class="ring-number" x="240" y="200" font-size="12" style="animation-delay: 550ms">5</text>

      <!-- ego -->
      <circle class="ego" cx="240" cy="215" r="2"></circle>

      <!-- uzinaduzina marker -->
      <line class="marker-line" x1="315" y1="190" x2="395" y2="190"></line>
      <text class="marker" x="400" y="187">uzinaduzina</text>
      <text class="ring-tag" x="400" y="202" font-size="9" style="animation-delay: 800ms">~12 people</text>
    </svg>
    <p class="read-more">A theory of how a dozen turns out to be the right number. <a href="../../?n=curiosity-dunbar-alexander-and-the-dozen" target="_top">Read more →</a></p>
  </div>
</body>
</html>
