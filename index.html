<script>
// Suppress benign ResizeObserver loop warning (browser-internal, not user code).
window.addEventListener('error', (e) => {
  if (e && e.message && /ResizeObserver loop/i.test(e.message)) {
    e.stopImmediatePropagation();
    e.preventDefault();
    return false;
  }
}, true);
const _origErr = window.onerror;
window.onerror = function(msg) {
  if (typeof msg === 'string' && /ResizeObserver loop/i.test(msg)) return true;
  if (_origErr) return _origErr.apply(this, arguments);
  return false;
};
</script>
